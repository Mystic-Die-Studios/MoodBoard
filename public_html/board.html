<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoodBoard — Editor</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="editor">
  <div class="toolbar">
    <div class="group">
      <button type="button" class="icon" id="backBtn" title="Back to gallery">&larr;</button>
      <input type="text" class="title" id="title" placeholder="Board title">
    </div>

    <div class="group">
      <label>Color <input type="color" id="color" value="#4d8bff"></label>
      <span class="swatches" id="swatches"></span>
      <button type="button" class="icon" id="swatchAdd" title="Save current color as a swatch">+</button>
      <label>Size <input type="range" id="size" min="1" max="80" value="6"></label>
      <span class="status" id="sizeVal">6</span>
    </div>

    <div class="group" id="brushGroup">
      <span class="ttl">Brush</span>
      <select id="brushType" title="Brush type">
        <option value="pencil">Pencil</option>
        <option value="dotted">Dotted</option>
        <option value="dashed">Dashed</option>
        <option value="spray">Spray</option>
      </select>
      <button type="button" class="tool" id="brushBtn" title="Brush options">Options</button>
    </div>

    <div class="group" id="editGroup">
      <button type="button" class="icon" id="dupBtn" title="Duplicate (Ctrl+D)">Duplicate</button>
      <button type="button" class="icon" id="forwardBtn" title="Bring forward one step">&uarr;</button>
      <button type="button" class="icon" id="backwardBtn" title="Send back one step">&darr;</button>
      <button type="button" class="icon" id="toFrontBtn" title="Bring to front">&uarr;&uarr;</button>
      <button type="button" class="icon" id="toBackBtn" title="Send to back">&darr;&darr;</button>
      <button type="button" class="tool" id="linkBtn" title="Add/edit hyperlink (Ctrl+click a link to open)">Link</button>
      <button type="button" class="tool" id="cropBtn" title="Crop selected image (drag a region)">Crop</button>
      <button type="button" class="tool" id="lockBtn" title="Lock / unlock selected">Lock</button>
      <button type="button" class="tool" id="propsBtn" title="Object properties (opacity, shadow, flip, …)">Props</button>
      <button type="button" class="tool" id="alignDistBtn" title="Align & distribute (multi-select)">Align</button>
      <button type="button" class="icon" id="arrangeBtn" title="Auto-arrange images into a grid">Arrange</button>
      <button type="button" class="icon danger" id="delBtn" title="Delete (Del)">Delete</button>
    </div>

    <div class="group">
      <button type="button" class="icon" id="undoBtn" title="Undo (Ctrl+Z)">Undo</button>
      <button type="button" class="icon" id="redoBtn" title="Redo (Ctrl+Shift+Z)">Redo</button>
    </div>

    <div class="group">
      <button type="button" class="primary" id="saveBtn" title="Save (Ctrl+S)">Save</button>
      <button type="button" class="icon" id="refreshBtn" title="Reload saved version">Refresh</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="canvas-host" id="host">
    <canvas id="c"></canvas>

    <!-- Translucent corner clusters (view controls) -->
    <div class="corner corner-tr" id="cornerTR">
      <button type="button" class="ctoggle" id="gridBtn" title="Toggle grid">Grid</button>
      <button type="button" class="ctoggle" id="snapGridBtn" title="Snap to grid">Snap grid</button>
      <button type="button" class="ctoggle" id="gridOptBtn" title="Grid options">&#9881;</button>
    </div>
    <div class="corner corner-br" id="cornerBR">
      <button type="button" class="ctoggle" id="zoomOut" title="Zoom out">&minus;</button>
      <button type="button" class="ctoggle" id="zoomReset" title="Reset to 100%"><span id="zoomLabel">100%</span></button>
      <button type="button" class="ctoggle" id="zoomIn" title="Zoom in">+</button>
      <button type="button" class="ctoggle" id="zoomFit" title="Fit to content">Fit</button>
    </div>

    <!-- Floating tool panel -->
    <div class="left-panel" id="leftPanel">
      <button type="button" class="ptool" id="toolSelect" title="Select / move (V)" aria-pressed="true">Select</button>
      <button type="button" class="ptool" id="toolDraw" title="Freehand draw (D)">Draw</button>
      <button type="button" class="ptool" id="toolErase" title="Eraser — erases anything beneath the stroke (E)">Erase</button>
      <div class="sep"></div>
      <button type="button" class="ptool" id="addText" title="Click to place text (T)">Text</button>
      <button type="button" class="ptool" id="addRect" title="Click to place a rectangle">Rect</button>
      <button type="button" class="ptool" id="addEllipse" title="Click to place an ellipse">Oval</button>
      <button type="button" class="ptool" id="addTriangle" title="Click to place a triangle">Tri</button>
      <button type="button" class="ptool" id="addLine" title="Drag to draw a line">Line</button>
      <button type="button" class="ptool" id="addArrow" title="Drag to draw an arrow">Arrow</button>
      <button type="button" class="ptool" id="addNote" title="Sticky note (click to place)">Note</button>
      <button type="button" class="ptool" id="addFrame" title="Frame / section (drag to create)">Frame</button>
      <button type="button" class="ptool" id="toolConnect" title="Connect one object to another">Connect</button>
      <button type="button" class="ptool" id="toolPick" title="Eyedropper — pick a color from the canvas">Pick</button>
      <button type="button" class="ptool" id="addImage" title="Upload an image">Image</button>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/gif" class="hidden" aria-label="Upload image" title="Upload image">
    </div>

    <!-- Floating text styling popover (positioned above the selected text) -->
    <div class="text-popover hidden" id="textPopover">
      <select id="fontFamily" title="Font family">
        <option value="system-ui, sans-serif">Sans</option>
        <option value="Georgia, serif">Serif</option>
        <option value="'Courier New', monospace">Mono</option>
        <option value="'Brush Script MT', cursive">Script</option>
        <option value="Impact, sans-serif">Impact</option>
      </select>
      <input type="number" id="fontSize" min="6" max="400" value="36" title="Font size">
      <button type="button" class="tool" id="boldBtn" title="Bold"><b>B</b></button>
      <button type="button" class="tool" id="italicBtn" title="Italic"><i>I</i></button>
      <button type="button" class="tool" id="underlineBtn" title="Underline"><u>U</u></button>
      <button type="button" class="icon" id="alignBtn" title="Text align">Left</button>
      <button type="button" class="tool" id="bulletBtn" title="Bulleted list">&bull;</button>
      <button type="button" class="tool" id="numberBtn" title="Numbered list">1.</button>
    </div>

    <!-- Object properties popup (toggled by the Props button; acts on the selection) -->
    <div class="props-popover hidden" id="propsPopup">
      <div class="row">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0" max="100" value="100" title="Opacity">
        <span class="val" id="opacityVal">100</span>
      </div>
      <div class="row">
        <label>Transform</label>
        <button type="button" class="tool" id="flipH" title="Flip horizontal">Flip H</button>
        <button type="button" class="tool" id="flipV" title="Flip vertical">Flip V</button>
        <button type="button" class="tool" id="grayBtn" title="Grayscale (images only)">Gray</button>
      </div>
      <div class="row" id="radiusRow">
        <label>Radius</label>
        <input type="range" id="cornerRadius" min="0" max="160" value="0" title="Corner radius">
        <span class="val" id="radiusVal">0</span>
      </div>
      <div class="row">
        <label>Shadow</label>
        <button type="button" class="tool" id="shadowBtn" title="Toggle drop shadow">On</button>
        <input type="color" id="shadowColor" value="#000000" title="Shadow color">
        <input type="range" id="shadowBlur" min="0" max="60" value="14" title="Shadow blur">
      </div>
      <div class="row" id="noteRow">
        <label>Note bg</label>
        <span class="swatches" id="noteSwatches"></span>
        <button type="button" class="icon" id="noteNone" title="Remove background">none</button>
      </div>
      <div id="imgAdjust">
        <div class="sep"></div>
        <div class="row"><label>Blur</label><input type="range" id="fBlur" min="0" max="100" value="0" title="Blur"><span class="val" id="fBlurVal">0</span></div>
        <div class="row"><label>Bright</label><input type="range" id="fBright" min="-100" max="100" value="0" title="Brightness"><span class="val" id="fBrightVal">0</span></div>
        <div class="row"><label>Contrast</label><input type="range" id="fContrast" min="-100" max="100" value="0" title="Contrast"><span class="val" id="fContrastVal">0</span></div>
        <div class="row"><label>Satur.</label><input type="range" id="fSat" min="-100" max="100" value="0" title="Saturation"><span class="val" id="fSatVal">0</span></div>
        <div class="row"><label>Hue</label><input type="range" id="fHue" min="-180" max="180" value="0" title="Hue shift (degrees)"><span class="val" id="fHueVal">0</span></div>
      </div>
    </div>

    <!-- Grid options popup -->
    <div class="props-popover hidden" id="gridPopup">
      <div class="row"><label>Scale</label><input type="range" id="gridScale" min="10" max="200" value="40" title="Grid scale"><span class="val" id="gridScaleVal">40</span></div>
      <div class="row"><label>Style</label><button type="button" class="tool" id="gridStyle" title="Dots / lines">Lines</button></div>
      <div class="row"><label>Strength</label><input type="range" id="gridStrength" min="3" max="90" value="32" title="Grid line strength"><span class="val" id="gridStrengthVal">32</span></div>
      <div class="row"><button type="button" class="tool" id="snapSelGrid" title="Snap selected objects to the grid now">Snap selection to grid</button></div>
    </div>

    <!-- Align & distribute popup -->
    <div class="props-popover hidden" id="alignPopup">
      <div class="row"><label>Align</label>
        <button type="button" class="icon" id="alL" title="Align left">L</button>
        <button type="button" class="icon" id="alCx" title="Align center (horizontal)">C</button>
        <button type="button" class="icon" id="alR" title="Align right">R</button>
        <button type="button" class="icon" id="alT" title="Align top">T</button>
        <button type="button" class="icon" id="alM" title="Align middle (vertical)">M</button>
        <button type="button" class="icon" id="alB" title="Align bottom">B</button>
      </div>
      <div class="row"><label>Distribute</label>
        <button type="button" class="icon" id="alDistH" title="Distribute horizontally">Horiz</button>
        <button type="button" class="icon" id="alDistV" title="Distribute vertically">Vert</button>
      </div>
    </div>

    <!-- Brush options popup (toggled by the Brush "Options" button) -->
    <div class="props-popover hidden" id="brushPopup">
      <div class="row"><label>Flow</label><input type="range" id="brushFlow" min="10" max="100" value="100" title="Flow (stroke opacity)"><span class="val" id="brushFlowVal">100</span></div>
      <div class="row" data-brush="pencil dotted dashed"><label>Smooth</label><input type="range" id="brushSmooth" min="0" max="30" value="0" title="Smoothing (higher = smoother)"><span class="val" id="brushSmoothVal">0</span></div>
      <div class="row" data-brush="dotted dashed"><label>Gap</label><input type="range" id="brushGap" min="2" max="80" value="14" title="Spacing"><span class="val" id="brushGapVal">14</span></div>
      <div class="row" data-brush="dashed"><label>Dash</label><input type="range" id="brushDash" min="2" max="120" value="18" title="Dash length"><span class="val" id="brushDashVal">18</span></div>
      <div class="row" data-brush="spray"><label>Density</label><input type="range" id="sprayDensity" min="1" max="40" value="16" title="Dots per dab (frequency)"><span class="val" id="sprayDensityVal">16</span></div>
      <div class="row" data-brush="spray"><label>Dot</label><input type="range" id="sprayDot" min="1" max="40" value="4" title="Dot size"><span class="val" id="sprayDotVal">4</span></div>
      <div class="row" data-brush="spray"><label>Variance</label><input type="range" id="sprayVar" min="0" max="40" value="2" title="Dot size variance"><span class="val" id="sprayVarVal">2</span></div>
      <div class="row" data-brush="spray"><label>Random &alpha;</label><button type="button" class="tool" id="sprayRand" title="Randomize dot opacity">Off</button></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Fabric.js: vendored, with CDN fallback -->
  <script src="assets/vendor/fabric.min.js"></script>
  <script>
    window.fabric || document.write(
      '<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"><\/script>');
  </script>
  <script src="assets/editor.js"></script>
</body>
</html>
